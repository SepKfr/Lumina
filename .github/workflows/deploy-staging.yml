# .github/workflows/deploy_staging.yml
name: Deploy Staging

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  test:
    name: Test
    uses: ./.github/workflows/run-tests.yml

  deploy:
    needs: test
    # Requires a self-hosted runner with labels: self-hosted, staging, lumina (Settings → Actions → Runners)
    runs-on: [self-hosted]
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy on server (local)
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_DIR=/opt/lumina/staging

          sudo mkdir -p "$DEPLOY_DIR"
          sudo chown -R ubuntu:ubuntu /opt/lumina

          # Copy repo contents into the staging deploy dir
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".venv" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            ./ "$DEPLOY_DIR/"

          cd "$DEPLOY_DIR"

          # Python deps
          command -v uv >/dev/null 2>&1 || { curl -LsSf https://astral.sh/uv/install.sh | sh; export PATH="$HOME/.local/bin:$PATH"; }

          # Install deps (prefer lockfile if you have it)
          if [ -f uv.lock ]; then uv sync --frozen; else uv sync; fi

          # Restart service
          sudo systemctl restart lumina-staging

          # Smoke test
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8502 >/dev/null; then
              echo "Lumina staging OK"
              exit 0
            fi
            sleep 1
          done

          echo "Staging smoke test failed"
          sudo systemctl status lumina-staging --no-pager || true
          sudo journalctl -u lumina-staging -n 120 --no-pager || true
          exit 1
